<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale= 2">
    <meta charset="UTF-8">
    <title>Keystone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Keystone</h1>

<!-- Plate Preview -->
<canvas id="plateCanvas" width="700" height="220" style="border:1px solid #ccc;"></canvas>

<div style="margin-top:8px;"
  <span id="currentLetters">---</span>
</div>
    <section class="card">
      <div class="plate-preview-wrap">
        <!-- UPDATED: narrower + taller canvas -->
        <canvas id="plateCanvas" width="600" height="300"></canvas>
      </div>
    </section>

    <section class="card">
      <div class="row center">
        <label for="wordInput"><strong>Words you formed / input:</strong></label>
        <input id="wordInput" type="text" maxlength="40" />
        <button id="submitBtn">Submit</button>
        <button id="answerBtn">Answer</button>
      </div>

      <div class="row center">
        <button id="randomBtn">Generate</button>
        <button id="clearBtn">Clear</button>
      </div>

      <div class="row center">
        <label for="lookupInput"><strong>3-Letter Plate Lookup:</strong></label>
        <input id="lookupInput" type="text" maxlength="3" />
        <button id="lookupBtn">Check / Load Plate</button>
      </div>

      <p id="lookupResult">Enter 3 letters to check whether words can be formed.</p>
      <p id="summary">Ready.</p>
      <p id="status">Loading...</p>
    </section>

    <section class="grid">
      <div class="card">
        <h2>Correct Submitted Words</h2>
        <ul id="submittedList"></ul>
      </div>

      <div class="card">
        <h2>Answer List</h2>
        <div id="results"></div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
